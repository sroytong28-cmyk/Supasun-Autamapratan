name: Build Android APK

on:
  push:
    branches: [ "หลัก" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK (Force System Gradle)
      # ใช้คำสั่ง 'gradle' ตัวหลักของเซิร์ฟเวอร์ โดยไม่ต้องพึ่งไฟล์ gradlew ในโปรเจกต์ และข้ามส่วนที่พังทั้งหมด
      run: gradle assembleDebug -x test -x lint -x kspDebugKotlin -Dandroid.injected.signing.store.file= -Dandroid.injected.signing.key.alias= -Dandroid.injected.signing.key.password= -Dandroid.injected.signing.store.password=

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-debug
        path: "**/build/outputs/apk/debug/*.apk"

name: Build Android APK

on:
  push:
    branches: [ "หลัก" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK (Force)
      # สั่งให้ข้ามทุกเออร์เรอร์และทำต่อเท่าที่ไหว
      run: gradle assembleDebug -x test -x lint --continue

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-debug
        path: "**/build/outputs/apk/debug/*.apk"

name: Build Android APK (Headless Fix)

on:
  push:
    branches: [ "หลัก", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK (Fix Headless Error)
      run: |
        ROOT_DIR=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
        cd "$ROOT_DIR"
        
        # ฉีดยาแก้ช็อค บังคับ Java ให้ทำงานแบบ "ไร้หน้าจอ" (Headless Mode)
        export JAVA_TOOL_OPTIONS="-Djava.awt.headless=true"
        
        # สั่ง Build อีกครั้ง พร้อมย้ำว่าไม่ต้องใช้หน้าจอ
        gradle assembleDebug \
          --no-daemon \
          -Djava.awt.headless=true \
          -Dorg.gradle.jvmargs="-Djava.awt.headless=true" \
          -x test \
          -x lint

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-debug
        path: "**/build/outputs/apk/debug/*.apk"

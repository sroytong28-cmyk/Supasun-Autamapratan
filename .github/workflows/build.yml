name: Build Android APK

on:
  push:
    branches: [ "หลัก" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # เพิ่มขั้นตอนเคลียร์แคชและปรับตั้งค่าให้ Build โดยไม่สนการลงชื่อ
    - name: Build Debug APK (Force)
      run: |
        ./gradlew assembleDebug -x test -x lint -x kspDebugKotlin -Dandroid.injected.signing.store.file= -Dandroid.injected.signing.key.alias= -Dandroid.injected.signing.key.password= -Dandroid.injected.signing.store.password=

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-debug
        path: "**/build/outputs/apk/debug/*.apk"

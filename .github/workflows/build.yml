name: Build Android APK (Headless Fix)

on:
  push:
    branches:
      - main
      - หลัก
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JAVA_TOOL_OPTIONS: -Djava.awt.headless=true
      GRADLE_OPTS: -Djava.awt.headless=true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Find Android Project
        id: project
        run: |
          ROOT_DIR=$(dirname "$(find . \( -name settings.gradle -o -name settings.gradle.kts \) | head -n 1)")
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      - name: Grant execute permission
        run: |
          cd "$ROOT_DIR"
          chmod +x gradlew || true

      - name: Build APK (Headless)
        run: |
          cd "$ROOT_DIR"

          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            -Djava.awt.headless=true \
            -x test \
            -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-debug
          path: |
            **/build/outputs/apk/debug/*.apk
